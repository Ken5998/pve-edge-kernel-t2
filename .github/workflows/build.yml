name: Kernel Build

on: push

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'skip ci') }}

    steps:
      - name: Free up disk space for the CI
        uses: Ken5998/remove-unwanted-software@v1
        with:
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: 'Checkout Repo'
        uses: actions/checkout@v6

      - name: Build Kernel
        run: |
          # Clona i patch T2 usando HEAD (nessun checkout a hash fisso)
          # Se una build futura si rompe per un patch rotto, basterà
          # aggiungere "git checkout <hash-stabile>" qui sotto.
          git clone https://github.com/t2linux/linux-t2-patches.git

          # Rimosso il blocco "git checkout / rm 2008* / wget" originale:
          # era una workaround per una regressione nel patch
          # 2008-i915-4-lane-quirk-for-mbp15-1.patch presente a quell'hash.
          # Usando HEAD i patch sono già nella versione corrente/corretta.

          # Il patch 2008-i915-4-lane-quirk-for-mbp15-1.patch non si applica più perché il file intel_quirks.h nel kernel 6.17.13 è cambiato rispetto a quando è stato scritto il patch.
          # Patch rimosso
          rm linux-t2-patches/2008-i915-4-lane-quirk-for-mbp15-1.patch

          echo "APT::Get::Assume-Yes \"true\";" > ./90forceyes

          apt list --installed | cut -d "/" -f 1 | grep python | xargs > ./python-pkg
          for missing in python3-apport python3-commandnotfound python3-distupgrade python3-problem-report python3-update-manager python3.10-venv
          do
            sed -i -e "s/\<${missing}\>//g" ./python-pkg
          done

          DOCKER_IMAGE=debian:trixie
          docker pull ${DOCKER_IMAGE}
          docker run \
            --privileged \
            -t \
            -v "$(pwd)":/repo \
            ${DOCKER_IMAGE} \
            /bin/bash -c 'cd /repo && \
              cp ./90forceyes /etc/apt/apt.conf.d/90forceyes && \
              apt update && apt install wget && \
              echo "Types: deb" > /etc/apt/sources.list.d/pve-install-repo.sources && \
              echo "URIs: http://download.proxmox.com/debian/pve" >> /etc/apt/sources.list.d/pve-install-repo.sources && \
              echo "Suites: trixie" >> /etc/apt/sources.list.d/pve-install-repo.sources && \
              echo "Components: pve-no-subscription" >> /etc/apt/sources.list.d/pve-install-repo.sources && \
              echo "Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg" >> /etc/apt/sources.list.d/pve-install-repo.sources && \
              wget https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg -O /usr/share/keyrings/proxmox-archive-keyring.gpg && \
              apt modernize-sources && apt update && apt install asciidoc-base automake bc bison cpio debhelper dh-python file flex \
                gcc git kmod libdw-dev libelf-dev libiberty-dev libnuma-dev libslang2-dev libssl-dev libtool lintian lz4 dwarves libpve-common-perl python3-dev zstd \
                perl-modules rsync sed sphinx-common tar xmlto zlib1g-dev gawk && \
                bindgen rustc rust-src rustfmt rust-clippy && \   # <-- aggiunto per kernel 7.0+
              git clone git://git.proxmox.com/git/pve-kernel.git && \
              cd pve-kernel && \
              # update ABI file for 7.0.2-2-pve (amd64)
              git checkout 59dd19a1c4f66f932d222eac91f9f1454f9b10cc && \
              # cd -
              cp ../linux-t2-patches/*patch ./patches/kernel && \
              cp ../T2.patch ./ && \
              git config --global user.email "example@example.com" && \
              git config --global user.name "Example Example" && \
              git am T2.patch && \
              KERNEL_SRC_SUBMODULE=submodules/ubuntu-kernel && \
              ZFSONLINUX_SUBMODULE=submodules/zfsonlinux && \
              git submodule update --depth 1 --init ${KERNEL_SRC_SUBMODULE} && \
              git submodule update --init --recursive ${ZFSONLINUX_SUBMODULE} && \
              make deb && \
              ls -l'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs
          path: ${{ github.workspace }}/pve-kernel/*.deb

      # ---------------------------------------------------------------
      # IMPORTANTE: aggiorna tag_name ad ogni nuova build.
      # Il formato è: v<versione-kernel>-<krel>-t2-<pkgrev>
      # Esempio: v6.17.13-1-t2-1
      #
      # Come trovare la versione giusta:
      #   git clone git://git.proxmox.com/git/pve-kernel.git
      #   cd pve-kernel && cat Makefile | grep -E "^KERNEL_|^KREL|^PKG_REV"
      # ---------------------------------------------------------------
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/pve-kernel/*.deb
          tag_name: v7.0.2-2-t2-1   # <-- aggiorna qui ad ogni build
          body: |
            Kernel PVE con patch T2 per Mac con chip T2.

            Patch T2 da: https://github.com/t2linux/linux-t2-patches (HEAD)
            Base: https://github.com/proxmox/pve-kernel

            Per installare:
            ```
            apt install ./proxmox-kernel-*t2*.deb
            ```

            Riferimenti utili:
            - https://wiki.t2linux.org/
            - https://wiki.t2linux.org/guides/fan/
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
